name: CI Build and Mathematical Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set Up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: TypeScript Static Compilation Check
      run: npm run lint

    - name: Run Deterministic Audit Tests
      run: npx tsx test.ts
